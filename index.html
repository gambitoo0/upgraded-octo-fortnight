<!DOCTYPE html>
<html lang="pt-BR">
<head>

      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 80px auto;
      padding: 40px;
      background: rgba(0,0,0,0.4);
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
    }

    .footer {
      margin-top: 40px;
      font-size: 16px;
      opacity: 0.8;
    }

    button {
      margin-top: 30px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #27ae60;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background-color: #2ecc71;
    }
  </style>
</head>

</html>
